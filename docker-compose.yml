version: '3.9'

services:
  app_php:
    build: ./app_php
    container_name: app-php
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network

  db:
    build: ./database
    container_name: mysql-server
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge